<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Diário da Minha Filha</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='18' y='14' width='64' height='74' rx='9' fill='%23d98b8b'/%3E%3Crect x='26' y='14' width='56' height='74' rx='8' fill='%23fffdfb'/%3E%3Cline x1='18' y1='32' x2='26' y2='32' stroke='%23c06b6b' stroke-width='4' stroke-linecap='round'/%3E%3Cline x1='18' y1='46' x2='26' y2='46' stroke='%23e8a87c' stroke-width='4' stroke-linecap='round'/%3E%3Cline x1='18' y1='60' x2='26' y2='60' stroke='%239bab8a' stroke-width='4' stroke-linecap='round'/%3E%3Ccircle cx='54' cy='46' r='15' fill='%23f5e6d8'/%3E%3Ccircle cx='49' cy='44' r='2.2' fill='%233a2e29'/%3E%3Ccircle cx='59' cy='44' r='2.2' fill='%233a2e29'/%3E%3Cpath d='M49 51 q5 4 10 0' stroke='%23c06b6b' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3Ccircle cx='44' cy='49' r='2.5' fill='%23e8a87c' opacity='.5'/%3E%3Ccircle cx='64' cy='49' r='2.5' fill='%23e8a87c' opacity='.5'/%3E%3Cpath d='M54 31 q-3 -6 -8 -3 q4 -1 8 3z' fill='%239bab8a'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito+Sans:wght@400;500;600;700&display=swap');

  :root{
    --bg:#fdf6f0;
    --bg-card:#fffdfb;
    --ink:#3a2e29;
    --ink-soft:#7a6a62;
    --rose:#d98b8b;
    --rose-deep:#c06b6b;
    --terra:#e8a87c;
    --sage:#9bab8a;
    --cream:#f5e6d8;
    --line:#ecdfd4;
    --shadow:0 4px 24px rgba(160,110,90,.10);
    --shadow-lg:0 10px 40px rgba(160,110,90,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:'Nunito Sans',sans-serif}
  body{
    background-image:radial-gradient(circle at 12% 18%, rgba(217,139,139,.06), transparent 40%),
                     radial-gradient(circle at 88% 78%, rgba(232,168,124,.07), transparent 42%);
    min-height:100vh;padding-bottom:96px;
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif}

  /* HEADER */
  header{
    padding:30px 22px 22px;text-align:center;position:relative;overflow:hidden;
    background:linear-gradient(160deg, #fbeae0 0%, #fdf6f0 100%);
    border-bottom:1px solid var(--line);
  }
  header .leaf{position:absolute;font-size:90px;opacity:.07;pointer-events:none}
  header .l1{top:-14px;left:-8px;transform:rotate(-18deg)}
  header .l2{bottom:-30px;right:-6px;transform:rotate(24deg)}
  header h1{font-size:30px;font-weight:600;letter-spacing:-.5px;line-height:1.1}
  header h1 .accent{color:var(--rose-deep);font-style:italic}
  header .sub{color:var(--ink-soft);font-size:14px;margin-top:6px}
  .gear{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:50%;width:38px;height:38px;font-size:17px;cursor:pointer;z-index:5;transition:.2s}
  .gear:active{transform:rotate(40deg)}
  .backup-main{margin-top:16px;background:var(--rose-deep);color:#fff;border:none;border-radius:999px;padding:12px 26px;font-size:14.5px;font-weight:700;font-family:'Nunito Sans';cursor:pointer;box-shadow:var(--shadow);transition:transform .15s}
  .backup-main:active{transform:scale(.96)}
  .settings-panel{display:none;max-width:380px;margin:16px auto 0;background:var(--bg-card);border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:var(--shadow-lg);text-align:left}
  .settings-panel.show{display:block;animation:rise .3s ease both}
  .set-item{display:block;width:100%;text-align:left;background:none;border:none;padding:11px 10px;font-size:14px;color:var(--ink);font-family:'Nunito Sans';font-weight:600;cursor:pointer;border-radius:10px}
  .set-item:active{background:var(--cream)}
  .set-divider{height:1px;background:var(--line);margin:6px 0}
  .set-save{background:var(--rose-deep);color:#fff;border:none;border-radius:12px;padding:10px 20px;font-weight:700;font-size:14px;font-family:'Nunito Sans';cursor:pointer;width:100%}
  .set-label{font-size:12px;font-weight:700;color:var(--ink-soft);padding:6px 10px 8px;text-transform:uppercase;letter-spacing:.4px}
  .theme-swatches{display:flex;flex-wrap:wrap;gap:10px;padding:4px 10px 8px}
  .swatch{width:50px;cursor:pointer;text-align:center}
  .swatch .dots{display:flex;border-radius:10px;overflow:hidden;height:30px;border:2px solid transparent;transition:.2s}
  .swatch.active .dots{border-color:var(--ink)}
  .swatch .dots span{flex:1}
  .swatch .nm{font-size:9.5px;font-weight:700;color:var(--ink-soft);margin-top:3px;display:block}
  .age-hero{
    display:inline-block;margin:10px auto 2px;font-family:'Fraunces';font-weight:600;
    font-size:16px;color:#fff;background:linear-gradient(135deg,var(--rose-deep),var(--terra));
    padding:7px 18px;border-radius:999px;box-shadow:var(--shadow);
  }
  .age-hero::before{content:'🎀 '}
  .age-clock{
    display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
    margin:14px auto 2px;
  }
  .age-clock .party{font-size:22px;line-height:1}
  .age-clock .units{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
  .age-unit{
    background:linear-gradient(135deg,var(--rose-deep),var(--terra));color:#fff;
    border-radius:14px;padding:6px 11px;min-width:46px;text-align:center;box-shadow:var(--shadow);
    animation:rise .4s ease both;
  }
  .age-unit .v{font-family:'Fraunces';font-size:21px;font-weight:700;line-height:1}
  .age-unit .u{font-size:10px;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .editname{background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;margin-top:8px;cursor:pointer}
  .iobtn{border:1px solid var(--line);background:var(--bg-card);color:var(--rose-deep);font-size:12.5px;font-weight:700;padding:8px 14px;border-radius:999px;cursor:pointer;font-family:'Nunito Sans'}

  /* TABS */
  nav.tabs{
    display:flex;gap:6px;padding:14px 14px 4px;overflow-x:auto;
    position:sticky;top:0;z-index:40;background:var(--bg);
    border-bottom:1px solid var(--line);scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{
    flex:0 0 auto;border:1px solid var(--line);background:var(--bg-card);
    color:var(--ink-soft);padding:9px 15px;border-radius:999px;font-size:13.5px;
    font-weight:600;font-family:'Nunito Sans';cursor:pointer;transition:.2s;
  }
  nav.tabs button.active{background:var(--rose-deep);color:#fff;border-color:var(--rose-deep);box-shadow:var(--shadow)}

  .wrap{max-width:680px;margin:0 auto;padding:18px 16px}
  .section-title{font-size:21px;font-weight:600;margin-bottom:4px}
  .section-sub{color:var(--ink-soft);font-size:13.5px;margin-bottom:16px}

  /* ENTRY CARD */
  .entry{
    background:var(--bg-card);border:1px solid var(--line);border-radius:20px;
    padding:18px;margin-bottom:16px;box-shadow:var(--shadow);
    animation:rise .4s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .entry .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
  .entry .date{font-family:'Fraunces';font-size:17px;font-weight:600}
  .entry .meta{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .entry .theme-tag{
    display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
    padding:4px 10px;border-radius:999px;background:var(--cream);color:var(--ink);
  }
  .entry .text{font-size:15px;line-height:1.6;margin:10px 0;white-space:pre-wrap;word-break:break-word}
  .entry-title{font-family:'Fraunces';font-size:17px;font-weight:600;color:var(--rose-deep);margin:8px 0 2px;line-height:1.25}
  .entry audio{width:100%;margin-top:8px}
  .entry .transcript{
    background:#faf3ec;border-left:3px solid var(--terra);border-radius:0 10px 10px 0;
    padding:10px 12px;margin-top:10px;font-size:14px;line-height:1.55;color:var(--ink-soft);font-style:italic;
  }
  .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:10px}
  .media-grid img,.media-grid video{width:100%;height:90px;object-fit:cover;border-radius:12px;cursor:pointer;background:#eee}
  .entry .del{background:none;border:none;color:var(--rose-deep);font-size:12px;cursor:pointer;opacity:.7;margin-top:10px}
  .entry-actions{display:flex;gap:16px;margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
  .entry-actions button{background:none;border:none;font-size:12.5px;font-weight:700;cursor:pointer;font-family:'Nunito Sans';padding:0}
  .entry-actions .edit{color:var(--ink-soft)}
  .entry-actions .del{color:var(--rose-deep);margin-top:0;opacity:1}
  .scope-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;color:#fff}
  .scope-dia{background:var(--sage)}
  .scope-semana{background:var(--terra)}

  .empty{text-align:center;color:var(--ink-soft);padding:50px 20px;font-size:14.5px}
  .empty .big{font-size:46px;display:block;margin-bottom:10px;opacity:.5}

  /* WEEK / TIMELINE GROUPS */
  .group-head{
    font-family:'Fraunces';font-size:16px;font-weight:600;color:var(--rose-deep);
    margin:22px 0 10px;padding-bottom:6px;border-bottom:1px dashed var(--line);
  }
  .timeline .entry{position:relative;margin-left:18px}
  .timeline .entry::before{content:'';position:absolute;left:-18px;top:24px;width:10px;height:10px;border-radius:50%;background:var(--rose);box-shadow:0 0 0 4px var(--bg)}
  .timeline{border-left:2px solid var(--line);padding-left:4px;margin-left:6px}

  /* FAB */
  .fab{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--rose-deep);color:#fff;border:none;border-radius:999px;
    padding:15px 26px;font-size:15px;font-weight:700;font-family:'Nunito Sans';
    box-shadow:var(--shadow-lg);cursor:pointer;z-index:50;display:flex;align-items:center;gap:8px;
    transition:transform .15s;
  }
  .fab:active{transform:translateX(-50%) scale(.95)}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(58,46,41,.45);backdrop-filter:blur(3px);z-index:60;display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{
    background:var(--bg);width:100%;max-width:680px;max-height:92vh;overflow-y:auto;
    border-radius:26px 26px 0 0;padding:22px 18px 30px;animation:slideup .3s ease;
  }
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet h2{font-size:22px;font-weight:600;margin-bottom:16px;text-align:center}
  .sheet .grab{width:42px;height:5px;background:var(--line);border-radius:9px;margin:0 auto 16px}
  label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin:14px 0 6px}
  input[type=text],input[type=date],textarea,select{
    width:100%;border:1px solid var(--line);background:var(--bg-card);border-radius:14px;
    padding:12px 14px;font-size:15px;font-family:'Nunito Sans';color:var(--ink);
  }
  textarea{min-height:90px;resize:vertical;line-height:1.5}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--rose)}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;border:1px solid var(--line);background:var(--bg-card);padding:11px;border-radius:14px;font-weight:700;font-size:14px;color:var(--ink-soft);cursor:pointer}
  .seg button.on{background:var(--rose-deep);color:#fff;border-color:var(--rose-deep)}
  .theme-pick{display:flex;flex-wrap:wrap;gap:7px}
  .theme-pick button{border:1px solid var(--line);background:var(--bg-card);padding:8px 13px;border-radius:999px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;gap:5px}
  .theme-pick button.on{background:var(--cream);color:var(--ink);border-color:var(--terra)}

  .rec-row{display:flex;gap:10px;align-items:center;margin-top:6px}
  .rec-btn{flex:1;border:none;border-radius:14px;padding:13px 10px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:'Nunito Sans';display:flex;align-items:center;justify-content:center;gap:6px;text-align:center;line-height:1.2}
  .rec-start{background:var(--sage);color:#fff}
  .rec-transcribe{background:var(--terra);color:#fff}
  .rec-onlytrans{background:var(--sage);color:#fff}
  .tidy-btn{margin-top:8px;background:none;border:1px solid var(--line);color:var(--rose-deep);font-weight:700;font-size:13px;padding:9px 14px;border-radius:12px;cursor:pointer;font-family:'Nunito Sans';width:100%}
  .rec-stop{background:var(--rose-deep);color:#fff;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .rec-note{font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.4}
  .filepreview{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .filepreview .chip{position:relative}
  .filepreview img,.filepreview video{width:64px;height:64px;object-fit:cover;border-radius:10px}
  .filepreview .x{position:absolute;top:-6px;right:-6px;background:var(--rose-deep);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;line-height:1}
  .savebar{display:flex;gap:10px;margin-top:24px}
  .savebar button{flex:1;border:none;border-radius:14px;padding:14px;font-weight:700;font-size:15px;cursor:pointer;font-family:'Nunito Sans'}
  .save{background:var(--rose-deep);color:#fff}
  .cancel{background:var(--cream);color:var(--ink)}

  /* lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:90;display:none;align-items:center;justify-content:center;padding:18px}
  .lightbox.show{display:flex}
  .lightbox img,.lightbox video{max-width:100%;max-height:90vh;border-radius:12px}
  .lightbox .close{position:absolute;top:18px;right:20px;color:#fff;font-size:34px;background:none;border:none;cursor:pointer}

  .stat-row{display:flex;gap:10px;margin-bottom:18px}
  .stat{flex:1;background:var(--bg-card);border:1px solid var(--line);border-radius:16px;padding:14px;text-align:center;box-shadow:var(--shadow)}
  .stat .n{font-family:'Fraunces';font-size:26px;font-weight:600;color:var(--rose-deep)}
  .stat .l{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;z-index:100;opacity:0;transition:.3s;pointer-events:none}
  .bc-sheet{padding-bottom:24px}
  .bc-title{font-family:'Fraunces';font-size:20px;font-weight:600;text-align:center;margin-bottom:16px}
  .bc-opt{display:block;width:100%;text-align:left;background:var(--bg-card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;font-size:15px;font-weight:700;color:var(--ink);font-family:'Nunito Sans';cursor:pointer}
  .bc-opt span{display:block;font-size:12px;font-weight:400;color:var(--ink-soft);margin-top:3px}
  .bc-opt:active{background:var(--cream)}
  .bc-cancel{display:block;width:100%;background:var(--cream);border:none;border-radius:14px;padding:13px;font-size:14px;font-weight:700;color:var(--ink);font-family:'Nunito Sans';cursor:pointer;margin-top:4px}
  .toast.show{opacity:1}

  /* resumo */
  .resumo-block{background:var(--bg-card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);animation:rise .4s ease both}
  .resumo-head{font-family:'Fraunces';font-size:18px;font-weight:600;color:var(--rose-deep);text-transform:capitalize}
  .resumo-stats{font-size:13px;color:var(--ink-soft);margin:6px 0 10px}
  .narrative{font-size:14px;line-height:1.6;background:#faf3ec;border-left:3px solid var(--terra);border-radius:0 12px 12px 0;padding:11px 13px;margin-bottom:12px;color:var(--ink)}
  .narrative b{color:var(--rose-deep)}
  .rchips{display:flex;flex-wrap:wrap;gap:6px}
  .rchip{font-size:11.5px;font-weight:700;background:var(--cream);color:var(--ink);padding:4px 10px;border-radius:999px}
  .resumo-toggle{margin-top:12px;background:none;border:1px solid var(--line);color:var(--rose-deep);font-weight:700;font-size:12.5px;padding:7px 14px;border-radius:999px;cursor:pointer;font-family:'Nunito Sans'}
  .resumo-items{margin-top:12px}
  mark{background:#ffe7a8;color:var(--ink);border-radius:4px;padding:0 2px}
  .filter-box{background:var(--bg-card);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:14px;box-shadow:var(--shadow)}
  .filter-box input[type=text]{margin-bottom:8px}
  .filter-custom{display:flex;gap:8px;margin-top:8px}
  .filter-custom>div{flex:1}
  .filter-custom .fc-lab{display:block;font-size:11px;font-weight:700;color:var(--ink-soft);margin-bottom:3px}
  .filter-custom input[type=date]{width:100%;font-size:13px}
  .fc-hint{font-size:11px;color:var(--ink-soft);margin-top:6px}
  .filter-row{display:flex;gap:8px}
  .filter-row select{flex:1;min-width:0}
  .filter-clear{margin-top:10px;background:var(--cream);border:none;color:var(--ink);font-weight:700;font-size:12.5px;padding:7px 14px;border-radius:999px;cursor:pointer;font-family:'Nunito Sans'}
  .age-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .age-card{background:linear-gradient(135deg,var(--rose-deep),var(--terra));color:#fff;border-radius:20px;padding:22px 14px;text-align:center;box-shadow:var(--shadow-lg)}
  .age-card .ac-ic{font-size:26px;line-height:1;margin-bottom:6px}
  .age-card .ac-num{font-family:'Fraunces';font-size:38px;font-weight:700;line-height:1;word-break:break-word}
  .age-card .ac-label{font-size:13px;font-weight:700;opacity:.92;margin-top:6px;text-transform:uppercase;letter-spacing:1px}
  .age-detail{text-align:center}
  .age-detail .age-extenso{font-family:'Fraunces';font-size:18px;font-weight:600;color:var(--rose-deep);line-height:1.4}
  /* informações */
  .info-add-btn{width:100%;background:var(--rose-deep);color:#fff;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:700;font-family:'Nunito Sans';cursor:pointer;margin-bottom:16px;box-shadow:var(--shadow)}
  .info-list{display:flex;flex-direction:column;gap:12px}
  .info-card{background:var(--bg-card);border:1px solid var(--line);border-left:5px solid var(--rose-deep);border-radius:16px;padding:15px;box-shadow:var(--shadow);animation:rise .3s ease both}
  .info-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .info-card-title{font-family:'Fraunces';font-size:17px;font-weight:600;line-height:1.25}
  .info-reorder{display:flex;flex-direction:column;gap:3px;flex:0 0 auto}
  .info-reorder button{background:var(--cream);border:none;border-radius:7px;width:30px;height:24px;font-size:11px;cursor:pointer;color:var(--ink)}
  .info-reorder button:disabled{opacity:.3;cursor:default}
  .info-card-content{font-size:14.5px;line-height:1.55;margin-top:8px;white-space:pre-wrap;word-break:break-word;color:var(--ink)}
  .info-card-actions{display:flex;gap:14px;margin-top:12px}
  .info-card-actions button{background:none;border:none;color:var(--ink-soft);font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Nunito Sans'}
  .info-colors{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .ic-swatch{width:38px;height:38px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:.2s;padding:0;flex:0 0 auto;box-sizing:border-box;vertical-align:middle}
  .ic-swatch.on{border-color:var(--ink);transform:scale(1.08)}
  .ic-custom{width:38px;height:38px;border-radius:50%;border:3px solid var(--line);cursor:pointer;overflow:hidden;position:relative;flex:0 0 auto;box-sizing:border-box;background:#fff;display:flex;align-items:center;justify-content:center;vertical-align:middle}
  .ic-custom.on{border-color:var(--ink);transform:scale(1.08)}
  .ic-plus{font-size:20px;font-weight:700;color:var(--ink-soft);line-height:1;pointer-events:none;display:block;margin-top:-2px}
  .ic-custom input[type=color]{position:absolute;inset:0;width:100%;height:100%;border:none;padding:0;margin:0;opacity:0;cursor:pointer}
</style>
</head>
<body>
<header>

  <div class="settings-panel" id="settingsPanel">
    <div class="set-label">👶 Nome do filho(a)</div>
    <div style="padding:0 10px 8px"><input type="text" id="nameField" placeholder="Ex.: Maria" style="font-size:14px"></div>

    <div style="padding:0 10px 8px"><input type="date" id="birthField" style="font-size:14px" oninput="updateBirthPreview()"><div id="birthPreview" style="font-size:12px;color:var(--ink-soft);margin-top:4px"></div></div>

<div class="wrap" id="content"></div>

<button class="fab" onclick="openSheet()">＋ Novo registro</button>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="grab"></div>
    <h2 id="entrySheetTitle">Novo registro</h2>

    <label>Este registro é de um...</label>
    <div class="seg" id="scopeSeg">
      <button class="on" data-scope="dia">📅 Dia</button>

<div class="lightbox" id="lightbox"><button class="close" onclick="closeLightbox()">×</button><div id="lbContent"></div></div>

    </div>

<div class="toast" id="toast"></div>

<script>
/* ---------- IndexedDB setup ---------- */
let db;
const DBNAME='diarioFilha', STORE='entries', META='meta', INFO='info';
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DBNAME,2);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE,{keyPath:'id'});
      if(!d.objectStoreNames.contains(META)) d.createObjectStore(META,{keyPath:'key'});
      if(!d.objectStoreNames.contains(INFO)) d.createObjectStore(INFO,{keyPath:'id'});
    };
    r.onsuccess=e=>{db=e.target.result;res()};
    r.onerror=e=>rej(e);
  });
}
function tx(store,mode){return db.transaction(store,mode).objectStore(store)}
function putEntry(o){return new Promise(r=>{tx(STORE,'readwrite').put(o).onsuccess=()=>r()})}
function delEntry(id){return new Promise(r=>{tx(STORE,'readwrite').delete(id).onsuccess=()=>r()})}
function allEntries(){return new Promise(r=>{tx(STORE,'readonly').getAll().onsuccess=e=>r(e.target.result)})}
function putInfo(o){return new Promise(r=>{tx(INFO,'readwrite').put(o).onsuccess=()=>r()})}
function delInfo(id){return new Promise(r=>{tx(INFO,'readwrite').delete(id).onsuccess=()=>r()})}
function allInfo(){return new Promise(r=>{tx(INFO,'readonly').getAll().onsuccess=e=>r(e.target.result)})}
function putMeta(k,v){return new Promise(r=>{tx(META,'readwrite').put({key:k,value:v}).onsuccess=()=>r()})}
function getMeta(k){return new Promise(r=>{tx(META,'readonly').get(k).onsuccess=e=>r(e.target.result?e.target.result.value:null)})}

/* ---------- Themes ---------- */
const THEMES=[
  {id:'marcos',label:'Marcos',ic:'⭐'},
  {id:'sono',label:'Sono',ic:'😴'},
  {id:'comida',label:'Comida',ic:'🍼'},
  {id:'saude',label:'Saúde',ic:'🩺'},
  {id:'passeio',label:'Passeios',ic:'🌳'},
  {id:'fala',label:'Falas/sons',ic:'💬'},
  {id:'humor',label:'Humor',ic:'😊'},
  {id:'familia',label:'Família',ic:'👨‍👩‍👧'},
  {id:'outros',label:'Outros',ic:'📝'},
];
const themeOf=id=>THEMES.find(t=>t.id===id)||THEMES[8];

/* ---------- Paletas de cores ---------- */
const PALETTES=[
  {id:'rosa', nm:'Rosa', vars:{'--bg':'#fdf6f0','--bg-card':'#fffdfb','--ink':'#3a2e29','--ink-soft':'#7a6a62','--rose':'#d98b8b','--rose-deep':'#c06b6b','--terra':'#e8a87c','--sage':'#9bab8a','--cream':'#f5e6d8','--line':'#ecdfd4'}, hdr:'#fbeae0'},
  {id:'lavanda', nm:'Lavanda', vars:{'--bg':'#f7f4fb','--bg-card':'#fffdff','--ink':'#352f40','--ink-soft':'#6f6580','--rose':'#a98bd9','--rose-deep':'#8b6bc0','--terra':'#c79be0','--sage':'#9ba8d9','--cream':'#ece4f5','--line':'#e3dcef'}, hdr:'#efe7f9'},
  {id:'menta', nm:'Menta', vars:{'--bg':'#f0faf5','--bg-card':'#fbfffd','--ink':'#293a32','--ink-soft':'#62786c','--rose':'#7cc0a0','--rose-deep':'#5aa884','--terra':'#8ad0b8','--sage':'#8abf9b','--cream':'#dcf0e6','--line':'#d4ece0'}, hdr:'#e0f5ea'},
  {id:'ceu', nm:'Céu', vars:{'--bg':'#f0f6fb','--bg-card':'#fbfdff','--ink':'#28333f','--ink-soft':'#5f6e80','--rose':'#7ca8d9','--rose-deep':'#5a87c0','--terra':'#7cc0d0','--sage':'#8aabbf','--cream':'#dce8f5','--line':'#d4e0ec'}, hdr:'#e0edf9'},
  {id:'sol', nm:'Sol', vars:{'--bg':'#fdfaef','--bg-card':'#fffefb','--ink':'#3f3729','--ink-soft':'#807162','--rose':'#e0b35a','--rose-deep':'#c99a3a','--terra':'#e8c87c','--sage':'#bfae8a','--cream':'#f5edd8','--line':'#ece4d4'}, hdr:'#faf2e0'},
  {id:'noite', nm:'Noite', vars:{'--bg':'#26222b','--bg-card':'#322d38','--ink':'#f0eaf2','--ink-soft':'#b8aec0','--rose':'#d98bb0','--rose-deep':'#e6a0c0','--terra':'#e0a87c','--sage':'#9bab8a','--cream':'#3d3647','--line':'#433c4e'}, hdr:'#2e2935'},
];
let currentPalette='rosa';
function applyPalette(id){
  const p=PALETTES.find(x=>x.id===id)||PALETTES[0];
  currentPalette=p.id;
  const root=document.documentElement;
  Object.entries(p.vars).forEach(([k,v])=>root.style.setProperty(k,v));
  const hdr=document.querySelector('header');
  if(hdr)hdr.style.background=`linear-gradient(160deg, ${p.hdr} 0%, ${p.vars['--bg']} 100%)`;
  renderSwatches();
}
function renderSwatches(){
  const c=document.getElementById('themeSwatches');
  if(!c)return;
  c.innerHTML=PALETTES.map(p=>`
    <div class="swatch ${p.id===currentPalette?'active':''}" data-p="${p.id}">
      <div class="dots">
        <span style="background:${p.vars['--rose-deep']}"></span>
        <span style="background:${p.vars['--terra']}"></span>
        <span style="background:${p.vars['--bg']}"></span>
      </div>
      <span class="nm">${p.nm}</span>
    </div>`).join('');
  c.querySelectorAll('.swatch').forEach(s=>s.onclick=async()=>{applyPalette(s.dataset.p);await putMeta('palette',s.dataset.p);toast('Tema aplicado 🎨')});
}

/* ---------- State ---------- */
let view='registros', scope='dia', selTheme='marcos';
let regMode='dia';
let resumoMode='semana', searchTerm='';
let tlPeriod='all', tlTheme='all', tlSearch='';
let tlStart='', tlEnd='';
let pendingMedia=[]; // {type,blob}
let editingEntryId=null;
let pendingAudio=null;
let recognition=null, mediaRec=null, audioChunks=[], recording=false;
let transcriptActive=false, finalTranscript='', recStream=null, gotSpeech=false;
let babyName='minha filha', birth=null;

/* ---------- Utils ---------- */
function fmtDate(iso){const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function fmtShort(iso){const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}
function weekKey(iso){const d=new Date(iso+'T00:00:00');const day=d.getDay();const monday=new Date(d);monday.setDate(d.getDate()-((day+6)%7));const sun=new Date(monday);sun.setDate(monday.getDate()+6);return monday.toISOString().slice(0,10)+'|'+`Semana de ${monday.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} a ${sun.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}`}
function babyAge(iso){
  if(!birth)return'';
  const b=new Date(birth+'T00:00:00'),d=new Date(iso+'T00:00:00');
  let totalDays=Math.round((d-b)/864e5);
  if(totalDays<0)return'';
  if(totalDays===0)return'recém-nascida';
  // meses de calendário
  let months=(d.getFullYear()-b.getFullYear())*12+(d.getMonth()-b.getMonth());
  let anchor=new Date(b.getFullYear(),b.getMonth()+months,b.getDate());
  if(anchor>d){months--;anchor=new Date(b.getFullYear(),b.getMonth()+months,b.getDate());}
  let remDays=Math.round((d-anchor)/864e5);
  let weeks=Math.floor(remDays/7);
  let days=remDays-weeks*7;
  const parts=[];
  const years=Math.floor(months/12);
  const remMonths=months%12;
  if(years>0)parts.push(`${years} ano${years>1?'s':''}`);
  if(remMonths>0)parts.push(`${remMonths} ${remMonths>1?'meses':'mês'}`);
  if(weeks>0)parts.push(`${weeks} semana${weeks>1?'s':''}`);
  if(days>0||parts.length===0)parts.push(`${days} dia${days!==1?'s':''}`);
  return parts.join(' ');
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function blobURL(b){return URL.createObjectURL(b)}

/* ---------- Render ---------- */
async function render(){
  const data=(await allEntries()).sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  const c=document.getElementById('content');
  updateAgeHero();

  if(data.length===0){
    c.innerHTML=`<div class="empty"><span class="big">🍼</span>Ainda não há registros.<br>Toque em <b>＋ Novo registro</b> para começar a guardar memórias.</div>`;return;
  }

  // stats
  const dias=new Set(data.map(d=>d.date)).size;
  const mid=data.reduce((s,d)=>s+(d.media?d.media.length:0),0);
  let html=`<div class="stat-row">
    <div class="stat"><div class="n">${data.length}</div><div class="l">registros</div></div>
    <div class="stat"><div class="n">${dias}</div><div class="l">dias</div></div>
    <div class="stat"><div class="n">${mid}</div><div class="l">fotos/vídeos</div></div>
  </div>`;

  if(view==='registros'){
    html+=`<div class="seg" id="regSeg" style="margin-bottom:14px">
      <button class="${regMode==='dia'?'on':''}" data-reg="dia">📅 Dia</button>
      <button class="${regMode==='semana'?'on':''}" data-reg="semana">🗓️ Semana</button>
    </div>`;
    if(regMode==='dia'){
      const byDay={};data.filter(d=>d.scope==='dia').forEach(d=>{(byDay[d.date]=byDay[d.date]||[]).push(d)});
      const keys=Object.keys(byDay).sort((a,b)=>b.localeCompare(a));
      if(!keys.length)html+=`<div class="empty"><span class="big">📅</span>Nenhum registro de dia ainda.<br><span style="font-size:12px">Toque em ＋ e escolha “Dia”.</span></div>`;
      keys.forEach(k=>{html+=`<div class="group-head">${fmtDate(k)}${birth&&babyAge(k)?' · '+babyAge(k):''}</div>`;byDay[k].forEach(e=>html+=card(e))});
    }else{
      const byWeek={};data.filter(d=>d.scope==='semana').forEach(d=>{const k=weekKey(d.date);(byWeek[k]=byWeek[k]||[]).push(d)});
      const keys=Object.keys(byWeek).sort((a,b)=>b.localeCompare(a));
      if(!keys.length)html+=`<div class="empty"><span class="big">🗓️</span>Nenhum registro semanal ainda.<br><span style="font-size:12px">Toque em ＋ e escolha “Semana”.</span></div>`;
      keys.forEach(k=>{html+=`<div class="group-head">${k.split('|')[1]}</div>`;byWeek[k].forEach(e=>html+=card(e))});
    }
  }
  else if(view==='linha'){
    html+=`<div class="section-title">Linha do tempo</div><div class="section-sub">Tudo junto, com filtros.</div>`;
    // controles de filtro
    const themeOpts=THEMES.map(t=>`<option value="${t.id}" ${tlTheme===t.id?'selected':''}>${t.ic} ${t.label}</option>`).join('');
    html+=`<div class="filter-box">
      <input type="text" id="tlSearch" placeholder="🔍 palavra-chave..." value="${escapeAttr(tlSearch)}">
      <div class="filter-row">
        <select id="tlPeriod">
          <option value="all" ${tlPeriod==='all'?'selected':''}>Todo o período</option>
          <option value="7" ${tlPeriod==='7'?'selected':''}>Últimos 7 dias</option>
          <option value="30" ${tlPeriod==='30'?'selected':''}>Últimos 30 dias</option>
          <option value="90" ${tlPeriod==='90'?'selected':''}>Últimos 3 meses</option>
          <option value="365" ${tlPeriod==='365'?'selected':''}>Último ano</option>
          <option value="custom" ${tlPeriod==='custom'?'selected':''}>📅 Período personalizado</option>
        </select>
        <select id="tlTheme">
          <option value="all" ${tlTheme==='all'?'selected':''}>Todos os temas</option>
          ${themeOpts}
        </select>
      </div>
      ${tlPeriod==='custom'?`<div class="filter-custom">
        <div><label class="fc-lab">De</label><input type="date" id="tlStart" value="${escapeAttr(tlStart)}"></div>
        <div><label class="fc-lab">Até</label><input type="date" id="tlEnd" value="${escapeAttr(tlEnd)}"></div>
      </div><div class="fc-hint">Deixe um dos campos vazio para “a partir de” ou “até” uma data.</div>`:''}
      ${(tlSearch||tlPeriod!=='all'||tlTheme!=='all')?`<button class="filter-clear" onclick="clearFilters()">✕ limpar filtros</button>`:''}
    </div>`;
    // aplica filtros
    let filtered=data.slice();
    if(tlPeriod==='custom'){
      if(tlStart)filtered=filtered.filter(e=>e.date>=tlStart);
      if(tlEnd)filtered=filtered.filter(e=>e.date<=tlEnd);
    }else if(tlPeriod!=='all'){const cutoff=new Date();cutoff.setDate(cutoff.getDate()-parseInt(tlPeriod));const cs=cutoff.toISOString().slice(0,10);filtered=filtered.filter(e=>e.date>=cs)}
    if(tlTheme!=='all')filtered=filtered.filter(e=>e.theme===tlTheme);
    const q=tlSearch.trim().toLowerCase();
    if(q)filtered=filtered.filter(e=>((e.title||'')+' '+(e.text||'')+' '+(e.transcript||'')).toLowerCase().includes(q));
    html+=`<div class="section-sub">${filtered.length} registro${filtered.length!==1?'s':''}.</div>`;
    html+=`<div class="timeline">`;
    if(!filtered.length)html+=`<div class="empty"><span class="big">🔍</span>Nada encontrado com esses filtros.</div>`;
    filtered.forEach(e=>html+=card(e,q||null));html+=`</div>`;
  }
  else if(view==='tema'){
    html+=`<div class="section-title">Por tema</div><div class="section-sub">Toque para ver tudo de cada assunto.</div>`;
    THEMES.forEach(t=>{const items=data.filter(d=>d.theme===t.id);if(!items.length)return;
      html+=`<div class="group-head">${t.ic} ${t.label} <span style="font-weight:400;font-size:13px;color:var(--ink-soft)">· ${items.length}</span></div>`;
      items.forEach(e=>html+=card(e));});
  }
  else if(view==='resumo'){
    html+=`<div class="section-title">Resumo</div><div class="section-sub">Análise automática dos seus registros, por período.</div>`;
    html+=`<div class="seg" id="resumoSeg" style="margin-bottom:14px">
      <button class="${resumoMode==='semana'?'on':''}" data-rm="semana">🗓️ Por semana</button>
      <button class="${resumoMode==='mes'?'on':''}" data-rm="mes">📆 Por mês</button>
    </div>`;
    const groups={};
    data.forEach(e=>{
      let k;
      if(resumoMode==='semana')k=weekKey(e.date);
      else{const d=new Date(e.date+'T00:00:00');k=e.date.slice(0,7)+'|'+d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}
      (groups[k]=groups[k]||[]).push(e);
    });
    const keys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
    if(!keys.length)html+=`<div class="empty"><span class="big">📊</span>Sem registros ainda.</div>`;
    keys.forEach(k=>{
      const items=groups[k];
      const themeCount={};items.forEach(e=>{themeCount[e.theme]=(themeCount[e.theme]||0)+1});
      const mediaN=items.reduce((s,e)=>s+(e.media?e.media.length:0),0);
      const audioN=items.filter(e=>e.audio).length;
      const sorted=Object.entries(themeCount).sort((a,b)=>b[1]-a[1]);
      const chips=sorted.map(([t,n])=>`<span class="rchip">${themeOf(t).ic} ${themeOf(t).label} ·${n}</span>`).join('');
      const label=k.split('|')[1];
      const narrative=buildNarrative(items,sorted,resumoMode);
      html+=`<div class="resumo-block">
        <div class="resumo-head">${label}</div>
        <div class="resumo-stats">${items.length} registro${items.length>1?'s':''} · ${mediaN} mídia${mediaN!==1?'s':''} · ${audioN} áudio${audioN!==1?'s':''}</div>
        <div class="narrative">✨ ${narrative}</div>
        <div class="rchips">${chips}</div>
        <button class="resumo-toggle" data-key="${encodeURIComponent(k)}">ver registros ▾</button>
        <div class="resumo-items" id="ri-${encodeURIComponent(k)}" style="display:none">${items.map(e=>card(e)).join('')}</div>
      </div>`;
    });
  }
  else if(view==='busca'){
    html+=`<div class="section-title">Buscar</div><div class="section-sub">Procure por palavra em textos e transcrições.</div>`;
    html+=`<input type="text" id="searchBox" placeholder="🔍 Digite uma palavra..." value="${escapeAttr(searchTerm)}" style="margin-bottom:14px">`;
    if(searchTerm.trim()){
      const q=searchTerm.trim().toLowerCase();
      const hits=data.filter(e=>((e.title||'')+' '+(e.text||'')+' '+(e.transcript||'')).toLowerCase().includes(q));
      html+=`<div class="section-sub">${hits.length} resultado${hits.length!==1?'s':''} para “${escapeHtml(searchTerm.trim())}”.</div>`;
      hits.forEach(e=>html+=card(e,q));
      if(!hits.length)html+=`<div class="empty"><span class="big">🔍</span>Nada encontrado.</div>`;
    }else{
      html+=`<div class="empty"><span class="big">🔍</span>Digite uma palavra para buscar.</div>`;
    }
  }
  else if(view==='idade'){
    html+=`<div class="section-title">Idade</div>`;
    if(!birth){
      html+=`<div class="empty"><span class="big">🎂</span>Defina a data de nascimento em ⚙️ ajustes para ver o contador.</div>`;

function escapeAttr(s){return (s||'').replace(/"/g,'&quot;')}

/* ---------- Resumo inteligente local (sem IA, offline) ---------- */
function buildNarrative(items,sorted,mode){
  const periodo = mode==='semana' ? 'Nesta semana' : 'Neste mês';
  const n=items.length;
  const parts=[];
  // tema dominante
  if(sorted.length){
    const [topT,topN]=sorted[0];
    const tl=themeOf(topT).label.toLowerCase();
    if(topN>=Math.max(2, n*0.4) && sorted.length>1){
      parts.push(`${periodo} o foco foi <b>${tl}</b> (${topN} de ${n} registros)`);
    }else if(sorted.length>1){
      const nomes=sorted.slice(0,2).map(([t])=>themeOf(t).label.toLowerCase());
      parts.push(`${periodo} houve ${n} registros, principalmente sobre <b>${nomes.join('</b> e <b>')}</b>`);
    }else{
      parts.push(`${periodo} houve ${n} registro${n>1?'s':''} sobre <b>${tl}</b>`);
    }
  }
  // marcos em destaque
  const marcos=items.filter(e=>e.theme==='marcos');
  if(marcos.length){
    const snippet=marcos.map(m=>(m.text||m.transcript||'').trim()).filter(Boolean)[0];
    if(snippet){
      const s=snippet.length>90?snippet.slice(0,90).trim()+'…':snippet;
      parts.push(`⭐ Marco registrado: “${escapeHtml(s)}”`);
    }else{
      parts.push(`⭐ ${marcos.length} marco${marcos.length>1?'s':''} registrado${marcos.length>1?'s':''}`);
    }
  }
  // saúde
  const saude=items.filter(e=>e.theme==='saude');
  if(saude.length)parts.push(`🩺 ${saude.length} registro${saude.length>1?'s':''} de saúde`);
  // mídia / áudio
  const mediaN=items.reduce((s,e)=>s+(e.media?e.media.length:0),0);
  const audioN=items.filter(e=>e.audio).length;
  const mem=[];
  if(mediaN)mem.push(`${mediaN} foto${mediaN>1?'s':''}/vídeo${mediaN>1?'s':''}`);
  if(audioN)mem.push(`${audioN} áudio${audioN>1?'s':''}`);
  if(mem.length)parts.push(`📸 ${mem.join(' e ')} guardado${(mediaN+audioN)>1?'s':''}`);
  // dia mais ativo
  const byDay={};items.forEach(e=>byDay[e.date]=(byDay[e.date]||0)+1);
  const topDay=Object.entries(byDay).sort((a,b)=>b[1]-a[1])[0];
  if(topDay&&topDay[1]>=3)parts.push(`O dia mais movimentado foi ${fmtShort(topDay[0])} (${topDay[1]} registros)`);

  return parts.join('. ')+'.';
}

function computeAgeUnits(){
  // retorna {years,months,weeks,days} desde o nascimento até agora
  const b=new Date(birth+'T00:00:00');
  const now=new Date();
  let months=(now.getFullYear()-b.getFullYear())*12+(now.getMonth()-b.getMonth());
  let anchor=new Date(b.getFullYear(),b.getMonth()+months,b.getDate());
  if(anchor>now){months--;anchor=new Date(b.getFullYear(),b.getMonth()+months,b.getDate());}
  const remMs=now-anchor;
  const remDaysTotal=Math.floor(remMs/864e5);
  const weeks=Math.floor(remDaysTotal/7);
  const days=remDaysTotal-weeks*7;
  const years=Math.floor(months/12);
  const remMonths=months%12;
  return {years,months:remMonths,weeks,days,totalDays:Math.floor((now-b)/864e5)};
}
function updateAgeHero(){
  const c=document.getElementById('ageClock');
  if(!c)return;
  if(!birth){c.style.display='none';return;}
  c.style.display='flex';
  const a=computeAgeUnits();
  // revela progressivamente: só mostra unidades que já têm sentido
  const units=[];
  if(a.years>0)units.push(['ano'+(a.years>1?'s':''),a.years]);
  if(a.years>0||a.months>0)units.push([a.months===1?'mês':'meses',a.months]);
  if(a.years>0||a.months>0||a.weeks>0)units.push(['semana'+(a.weeks>1?'s':''),a.weeks]);
  units.push(['dia'+(a.days!==1?'s':''),a.days]);
  // recém-nascida
  let inner;
  if(a.totalDays===0){
    inner=`<div class="age-unit"><div class="v">0</div><div class="u">dias</div></div>`;
  }else{
    inner=units.map(([u,v])=>`<div class="age-unit"><div class="v">${v}</div><div class="u">${u}</div></div>`).join('');
  }
  c.innerHTML=`<span class="party">🎉</span><div class="units">${inner}</div><span class="party">🎉</span>`;
}

/* ---------- Contador de idade (aba) ---------- */
function renderAgeCounter(){
  const grid=document.getElementById('ageGrid');const det=document.getElementById('ageDetail');
  if(!grid||!birth)return;
  const b=new Date(birth+'T00:00:00');
  const now=new Date();
  const ms=now-b;
  const fmt=n=>n.toLocaleString('pt-BR');
  const days=Math.floor(ms/864e5);
  const weeks=Math.floor(ms/(7*864e5));
  let months=(now.getFullYear()-b.getFullYear())*12+(now.getMonth()-b.getMonth());
  if(now.getDate()<b.getDate())months--;
  months=Math.max(0,months);
  let years=now.getFullYear()-b.getFullYear();
  const hadBday=(now.getMonth()>b.getMonth())||(now.getMonth()===b.getMonth()&&now.getDate()>=b.getDate());
  if(!hadBday)years--;
  years=Math.max(0,years);
  const cards=[
    ['📅','dias',days],
    ['🗓️','semanas',weeks],
    ['🌙','meses',months],
    ['🎂','anos',years],
  ];
  grid.innerHTML=cards.map(([ic,label,val])=>`
    <div class="age-card">
      <div class="ac-ic">${ic}</div>
      <div class="ac-num">${fmt(val)}</div>
      <div class="ac-label">${label}</div>
    </div>`).join('');
  // detalhe: idade completa por extenso
  const a=computeAgeUnits();
  const parts=[];
  if(a.years>0)parts.push(`${a.years} ano${a.years>1?'s':''}`);
  if(a.years>0||a.months>0)parts.push(`${a.months} ${a.months===1?'mês':'meses'}`);
  if(a.years>0||a.months>0||a.weeks>0)parts.push(`${a.weeks} semana${a.weeks>1?'s':''}`);
  parts.push(`${a.days} dia${a.days!==1?'s':''}`);
  det.innerHTML=`<div class="age-extenso">🎉 ${parts.join(' · ')}</div><div style="font-size:12.5px;color:var(--ink-soft);margin-top:4px">nascida em ${fmtDMY(birth)}</div>`;
}

async function startRec(mode){
  const wantsAudio=(mode==='plain'||mode==='both');
  const wantsTranscription=(mode==='both'||mode==='only');
  try{
    // 1) Inicia a TRANSCRIÇÃO primeiro (no Android ela precisa do microfone).
    transcriptActive=wantsTranscription;
    if(wantsTranscription){
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SR){
        finalTranscript=document.getElementById('fText').value?document.getElementById('fText').value+' ':'';
        startRecognition(SR);
        document.getElementById('recNote').innerHTML='🔴 <b>Ouvindo...</b> fale normalmente. O texto aparece abaixo.';
      }else{
        document.getElementById('recNote').innerHTML='⚠️ Este navegador não transcreve. Use o <b>Chrome</b>.';
      }
    }
    // 2) Tenta gravar o áudio. Se falhar (conflito de microfone no Android),
    // NÃO interrompe a transcrição — só avisa que o áudio não pôde ser gravado.
    if(wantsAudio){
      try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRec=new MediaRecorder(stream);audioChunks=[];
        mediaRec.ondataavailable=e=>audioChunks.push(e.data);
        mediaRec.onstop=()=>{pendingAudio=new Blob(audioChunks,{type:'audio/webm'});
          document.getElementById('audioPreview').innerHTML=`<audio controls src="${blobURL(pendingAudio)}" style="width:100%;margin-top:8px"></audio>`;
          stream.getTracks().forEach(t=>t.stop());};
        mediaRec.start();
      }catch(audioErr){
        if(mode==='plain'){throw audioErr;} // sem transcrição, o áudio é essencial
        // modo both no celular: mantém só a transcrição
        document.getElementById('recNote').innerHTML='🔴 <b>Ouvindo...</b> (neste aparelho o áudio não pôde ser gravado junto — a transcrição segue funcionando).';
      }
    }
    const ids={plain:'recBtnPlain',both:'recBtnTrans',only:'recBtnOnly'};
    const activeId=ids[mode];
    document.querySelectorAll('.rec-row .rec-btn').forEach(b=>{b.style.display=(b.id===activeId)?'':'none'});
    const active=document.getElementById(activeId);
    active.className='rec-btn rec-stop';active.textContent='⏹️ Parar';
    recording=true;
  }catch(err){
    let msg='Não foi possível acessar o microfone.';
    if(err&&err.name==='NotAllowedError')msg='Acesso ao microfone negado. Toque no cadeado 🔒 na barra de endereço → Permissões → Microfone → Permitir, e recarregue.';
    else if(err&&err.name==='NotFoundError')msg='Nenhum microfone encontrado neste aparelho.';
    else if(location.protocol!=='https:'&&location.protocol!=='file:')msg='O microfone só funciona com o site aberto pelo arquivo (file://) ou em HTTPS. Baixe o HTML e abra no Chrome.';
    document.getElementById('recNote').innerHTML='⚠️ '+msg+'<br>Você pode digitar o registro normalmente abaixo.';
    toast('Microfone bloqueado — veja a nota acima');
    resetRecBtn();
  }
}
function startRecognition(SR){
  recognition=new SR();
  recognition.lang='pt-BR';
  // continuous=false: cada sessão devolve UM resultado final por fala.
  // Isso evita o bug do Android de reprocessar resultados antigos (duplicação).
  recognition.continuous=false;
  recognition.interimResults=true;
  let committed=false;
  recognition.onresult=ev=>{
    gotSpeech=true;
    let sessionText='';
    let interim='';
    // pega só o resultado mais recente desta sessão
    for(let i=0;i<ev.results.length;i++){
      const t=ev.results[i][0].transcript;
      if(ev.results[i].isFinal)sessionText+=t+' ';
      else interim+=t;
    }
    // exibe consolidado + o que está sendo dito agora
    document.getElementById('fText').value=dedupeText((finalTranscript+sessionText+interim).trim());
    // guarda o final desta sessão para consolidar no onend
    if(sessionText){window._lastSession=sessionText;}
  };
  recognition.onerror=ev=>{
    if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){
      document.getElementById('recNote').innerHTML='⚠️ Microfone bloqueado para transcrição. Toque no 🔒 ao lado do endereço, permita o microfone e recarregue.';
      transcriptActive=false;
    }else if(ev.error==='language-not-supported'){
      document.getElementById('recNote').innerHTML='⚠️ Português não disponível para transcrição neste aparelho. Verifique a “Entrada por voz do Google” nas configurações.';
      transcriptActive=false;
    }
  };
  recognition.onend=()=>{
    // consolida o texto final desta sessão UMA única vez
    if(window._lastSession){
      finalTranscript=dedupeText((finalTranscript+window._lastSession).trim())+' ';
      window._lastSession='';
    }
    // reinicia uma nova sessão limpa enquanto estiver gravando
    if(transcriptActive&&recording){
      try{recognition.start()}catch(e){setTimeout(()=>{if(transcriptActive&&recording)try{recognition.start()}catch(_){}}, 250)}
    }
  };
  gotSpeech=false;window._lastSession='';
  try{recognition.start()}catch(e){}
  setTimeout(()=>{
    if(recording&&transcriptActive&&!gotSpeech){
      document.getElementById('recNote').innerHTML='🔴 Ouvindo... <span style="color:var(--rose-deep)">se nada aparecer, fale mais perto do microfone. Se continuar, toque em “Parar” e tente de novo.</span>';
    }
  },6000);
}
function stopRec(silent){
  transcriptActive=false;
  if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();
  if(recStream){try{recStream.getTracks().forEach(t=>t.stop())}catch(e){}recStream=null}
  if(recognition){try{recognition.onend=null;recognition.stop()}catch(e){}recognition=null}
  // ao parar, deixa o texto coeso
  if(!silent){
    const ft=document.getElementById('fText');
    if(ft&&ft.value.trim())ft.value=tidyText(ft.value);
  }
  resetRecBtn();
}

/* ---------- Deixar o texto coeso ---------- */
function dedupeText(s){
  if(!s)return s;
  const norm=w=>w.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[.,!?;:…]/g,'');
  let words=s.split(/\s+/).filter(Boolean);
  // 1) remove repetição imediata de 1 palavra
  let out=[];
  for(let i=0;i<words.length;i++){
    if(i>0&&norm(words[i])===norm(words[i-1]))continue;
    out.push(words[i]);
  }
  // 2) remove blocos de 2..12 palavras repetidos imediatamente, varrendo até estabilizar
  let changed=true,guard=0;
  while(changed&&guard++<30){
    changed=false;
    for(let n=12;n>=2;n--){
      for(let i=0;i+2*n<=out.length;i++){
        const a=out.slice(i,i+n).map(norm).join(' ');
        const b=out.slice(i+n,i+2*n).map(norm).join(' ');
        if(a&&a===b){out.splice(i+n,n);changed=true;i--;}
      }
    }
  }
  return out.join(' ');
}
function tidyText(raw){
  let t=dedupeText(raw.replace(/\s+/g,' ').trim());
  if(!t)return t;

  // 0) Correções comuns de escrita/acentuação (lista de trocas frequentes).
  // Observação: não é correção ortográfica completa — apenas erros comuns.
  const FIXES=[
    [/\bvc\b/gi,'você'],[/\btb\b/gi,'também'],[/\btbm\b/gi,'também'],
    [/\bpq\b/gi,'porque'],[/\bq\b/gi,'que'],[/\bqdo\b/gi,'quando'],
    [/\bhj\b/gi,'hoje'],[/\bdps\b/gi,'depois'],[/\bmsm\b/gi,'mesmo'],
    [/\bnao\b/gi,'não'],[/\bmae\b/gi,'mãe'],[/\bpai\b/g,'pai'],
    [/\bbebe\b/gi,'bebê'],[/\bvovo\b/gi,'vovó'],[/\bvovô\b/g,'vovô'],
    [/\bamamentaçao\b/gi,'amamentação'],[/\bconsulta\b/gi,'consulta'],
    [/\bpediatra\b/gi,'pediatra'],[/\bsorisso\b/gi,'sorriso'],
    [/\bdesemvolvimento\b/gi,'desenvolvimento'],[/\bcrescimeto\b/gi,'crescimento'],
    [/\bprimera\b/gi,'primeira'],[/\bprimero\b/gi,'primeiro'],
    [/\bfralda\b/gi,'fralda'],[/\bmamadeira\b/gi,'mamadeira'],
    [/\bseta\b(?=\s)/gi,'senta'],
  ];
  FIXES.forEach(([re,rep])=>{t=t.replace(re,m=>{
    // preserva maiúscula inicial se a palavra original começava com maiúscula
    const out=rep;
    return /^[A-ZÀ-Ý]/.test(m)?out.charAt(0).toUpperCase()+out.slice(1):out;
  })});

  // 1) Converte pontuação DITADA em voz para símbolos
  // (ex.: "ponto de exclamação", "vírgula", "interrogação")
  t=t.replace(/\s*\b(ponto de exclamação|ponto de exclamacao|exclamação|exclamacao)\b/gi,'!');
  t=t.replace(/\s*\b(ponto de interrogação|ponto de interrogacao|interrogação|interrogacao)\b/gi,'?');
  t=t.replace(/\s*\b(reticências|reticencias)\b/gi,'…');
  t=t.replace(/\s*\b(ponto e vírgula|ponto e virgula)\b/gi,';');
  t=t.replace(/\s*\b(dois pontos)\b/gi,':');
  t=t.replace(/\s*\b(vírgula|virgula)\b/gi,',');
  t=t.replace(/\s*\b(ponto final|ponto)\b/gi,'.');
  t=t.replace(/\b(nova linha|novo parágrafo|novo paragrafo|quebra de linha)\b/gi,'\n');

  // 2) (pergunta tratada no final, após segmentar frases)

  // 3) vírgula antes de conjunções/locuções comuns
  t=t.replace(/([^\s,.;:!?])\s+(mas|porém|contudo|todavia|entretanto|então|porque|pois|que|e que|já que|enquanto|ou seja|isto é|por isso|portanto|logo|assim como|embora|apesar de|caso|se bem que)\s/gi,'$1, $2 ');
  // vírgula depois de advérbios/locuções no início de frase
  t=t.replace(/(^|[.!?…]\s+)(hoje|ontem|amanhã|hoje de manhã|de manhã|à tarde|à noite|de repente|finalmente|enfim|aliás|por fim|além disso|primeiramente|depois disso|em seguida|logo depois|por enquanto|felizmente|infelizmente|claro|sim|não|talvez|provavelmente)\s+(?=[a-zA-Záàâãéêíóôõúç])/gi,(m,pre,w)=>pre+w+', ');
  // vírgula em vocativos comuns (nome no início chamando)
  // (enumeração automática removida: gerava vírgulas erradas)

  // 4) exclamação: interjeições e expressões de emoção -> !
  t=t.replace(/\b(que lindo|que linda|que fofo|que fofa|que amor|que gracinha|que coisa linda|nossa|uau|eba|aleluia|graças a deus|incrível|incrivel|maravilha|maravilhoso|maravilhosa|que delícia|que delicia|que orgulho|que felicidade|finalmente|consegui|conseguiu)\b(?=[\s.,]|$)/gi,(m,w)=>w+'!');

  // 5) ajusta espaços de pontuação
  t=t.replace(/\s+([,.;:!?…])/g,'$1').replace(/([,.;:!?…])(?=[^\s\n])/g,'$1 ');
  // limpa combinações erradas: "! ," "? ," "! ." etc.
  t=t.replace(/([!?…])\s*,\s*/g,'$1 ').replace(/([!?])\s*\.\s*/g,'$1 ');
  // remove pontuação duplicada
  t=t.replace(/([,.;:!?])\s*\1+/g,'$1').replace(/,\s*,/g,',');

  // 6) capitaliza início de frases (após . ! ? … e quebras de linha)
  t=t.replace(/(^\s*[a-záàâãéêíóôõúç])|([.!?…]\s+[a-záàâãéêíóôõúç])|(\n\s*[a-záàâãéêíóôõúç])/g,m=>m.toUpperCase());
  t=t.charAt(0).toUpperCase()+t.slice(1);

  // 7) pontuação final se faltar
  if(!/[.!?…]$/.test(t.trim()))t=t.trim()+'.';
  t=t.trim();

  // 8) Perguntas: frase iniciada por pronome/expressão interrogativa termina com ?
  t=t.replace(/([^.!?…]*?)([.])(\s|$)/g,(m,sentence,dot,after)=>{
    const s=sentence.trim();
    if(/^(quem|o que|que|qual|quais|quando|onde|aonde|por que|por quê|como|quanto|quanta|quantos|quantas|será|cadê|cade|você acha|tu achas|sera que|será que|por acaso|acaso)\b/i.test(s)){
      return sentence+'?'+after;
    }
    return m;
  });
  return t;
}

}

/* ---------- Save ---------- */
async function saveEntry(){
  const date=document.getElementById('fDate').value;
  const text=document.getElementById('fText').value.trim();
  const title=document.getElementById('fTitle').value.trim();
  if(!date){toast('Escolha uma data');return}
  if(recording)stopRec(true);
  await new Promise(r=>setTimeout(r,250)); // deixa o blob de áudio fechar
  const entry={
    id: editingEntryId||Date.now(),
    date,scope,theme:selTheme,title,text,
    transcript: (pendingAudio&&text)?text:'',
    audio:pendingAudio||null,
    media:pendingMedia.map(m=>({type:m.type,blob:m.blob})),
  };
  // se há áudio, joga o texto pra transcrição; senão fica como texto livre
  if(pendingAudio){entry.transcript=text;entry.text=''}
  await putEntry(entry);
  const wasEditing=!!editingEntryId;
  editingEntryId=null;
  closeSheet();render();toast(wasEditing?'Registro atualizado 💛':'Registro salvo 💛');
}

/* ---------- Backup / Import ---------- */
function blobToB64(blob){return new Promise((res,rej)=>{
  try{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(new Error('Falha ao ler mídia'));
    r.onabort=()=>rej(new Error('Leitura de mídia cancelada'));
    r.readAsDataURL(blob);
  }catch(e){rej(e)}
})}
function b64ToBlob(dataUrl){const [head,b64]=dataUrl.split(',');const mime=head.match(/:(.*?);/)[1];const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime})}

async function buildBackupBlob(onProgress){
  const data=await allEntries();
  const out=[];
  let idx=0;
  for(const e of data){
    idx++;
    if(onProgress)onProgress(idx,data.length);
    const o={id:e.id,date:e.date,scope:e.scope,theme:e.theme,title:e.title||'',text:e.text||'',transcript:e.transcript||''};
    try{
      if(e.audio)o.audio=await blobToB64(e.audio);
      if(e.media&&e.media.length){o.media=[];for(const m of e.media){if(m.blob)o.media.push({type:m.type,data:await blobToB64(m.blob)})}}
    }catch(err){
      // se uma mídia falhar, mantém o registro (texto) e segue, em vez de quebrar o backup todo
      console.warn('Mídia ignorada no backup:',err);
    }
    out.push(o);
  }
  const info=await allInfo();
  const backup={app:'diario-filha',version:1,exportedAt:new Date().toISOString(),name:babyName,birth,palette:currentPalette,entries:out,info};
  const json=JSON.stringify(backup);
  // validação leve: precisa ter conteúdo e a marca do app (sem reparse do arquivo inteiro,
  // que poderia falhar por memória quando há muitas fotos/vídeos)
  const ok = json && json.length>30 && json.indexOf('"app":"diario-filha"')!==-1 && json.indexOf('"entries":')!==-1;
  if(!ok)throw new Error('Backup gerado ficou inválido');
  return {blob:new Blob([json],{type:'application/json'}), count:out.length, infoCount:info.length};
}
function backupFilename(){return `backup-diario-${new Date().toISOString().slice(0,10)}.json`}

async function exportData(){
  try{
    toast('Preparando backup...');
    const {blob,count}=await buildBackupBlob((i,n)=>{
      if(n>3)toast(`Processando ${i} de ${n}...`);
    });
    const url=URL.createObjectURL(blob);
    const fname=backupFilename();
    // tenta o download normal
    const a=document.createElement('a');
    a.href=url;a.download=fname;a.rel='noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast(`Backup pronto: ${count} registro${count!==1?'s':''} 💾`);
    // fallback p/ navegadores móveis que bloqueiam download após processamento:
    // mostra um link manual para salvar
    showBackupFallback(url,fname);
    setTimeout(()=>URL.revokeObjectURL(url),120000);
  }catch(err){
    toast('Erro ao gerar backup. Tente novamente.');
    console.error(err);
  }
}
function showBackupFallback(url,fname){
  let box=document.getElementById('backupFallback');
  if(!box){
    box=document.createElement('div');box.id='backupFallback';
    box.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow-lg);z-index:200;max-width:90%;text-align:center;font-size:13.5px';
    document.body.appendChild(box);
  }
  box.innerHTML=`<div style="margin-bottom:8px">Se o download não começou, toque abaixo para salvar:</div>
    <a href="${url}" download="${fname}" style="display:inline-block;background:var(--rose-deep);color:#fff;padding:9px 18px;border-radius:999px;font-weight:700;text-decoration:none">⬇️ Baixar backup</a>
    <button onclick="document.getElementById('backupFallback').remove()" style="display:block;margin:10px auto 0;background:none;border:none;color:var(--ink-soft);font-size:12px;cursor:pointer">fechar</button>`;
  setTimeout(()=>{const b=document.getElementById('backupFallback');if(b)b.remove()},30000);
}
function doBackup(){
  openBackupChooser();
}
async function openBackupChooser(){
  // monta as opções disponíveis neste aparelho/navegador
  const canShare = !!(navigator.canShare && navigator.share);
  const canFolder = ('showDirectoryPicker' in window);
  let html=`<div class="bc-title">Como salvar o backup?</div>`;
  if(canShare)html+=`<button class="bc-opt" onclick="backupVia('share')">📤 Enviar / salvar no Drive<span>Abre o menu do celular para escolher o Google Drive, WhatsApp, etc.</span></button>`;
  if(canFolder)html+=`<button class="bc-opt" onclick="backupVia('folder')">📁 Salvar numa pasta<span>Escolha uma pasta (inclui Google Drive no computador).</span></button>`;
  html+=`<button class="bc-opt" onclick="backupVia('download')">⬇️ Baixar arquivo<span>Salva na pasta de Downloads do aparelho.</span></button>`;
  html+=`<button class="bc-cancel" onclick="closeBackupChooser()">Cancelar</button>`;
  let ov=document.getElementById('backupChooser');
  if(!ov){
    ov=document.createElement('div');ov.id='backupChooser';ov.className='overlay';
    ov.onclick=e=>{if(e.target.id==='backupChooser')closeBackupChooser()};
    document.body.appendChild(ov);
  }
  ov.innerHTML=`<div class="sheet bc-sheet"><div class="grab"></div>${html}</div>`;
  ov.classList.add('show');
}
function closeBackupChooser(){const ov=document.getElementById('backupChooser');if(ov)ov.classList.remove('show')}

async function backupVia(method){
  closeBackupChooser();
  if(method==='folder'){ if(driveHandle){saveToDrive()} else { connectThenSave() } return; }
  if(method==='share'){ shareBackup(); return; }
  exportData(); // download
}
async function connectThenSave(){
  // conecta uma pasta na hora e salva
  if(!('showDirectoryPicker' in window)){exportData();return}
  try{
    const handle=await window.showDirectoryPicker({mode:'readwrite'});
    driveHandle=handle;await putMeta('driveHandle',handle);refreshDriveUI();
    saveToDrive();
  }catch(e){/* cancelou */}
}
async function shareBackup(){
  try{
    toast('Preparando backup...');
    const {blob,count}=await buildBackupBlob((i,n)=>{if(n>3)toast(`Processando ${i} de ${n}...`)});
    const file=new File([blob],backupFilename(),{type:'application/json'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Backup do Diário',text:'Backup do diário da minha filha'});
      toast(`Backup pronto: ${count} registro${count!==1?'s':''} 💾`);
    }else{
      // se não puder compartilhar arquivo, cai pro download
      exportData();
    }
  }catch(err){
    if(err&&err.name==='AbortError')return; // usuário cancelou o menu de compartilhar
    console.error(err);exportData();
  }
}

/* ---------- Pasta do Drive (File System Access API) ---------- */
let driveHandle=null;
async function refreshDriveUI(){
  const supported='showDirectoryPicker' in window;
  const row=document.getElementById('driveRow');
  const st=document.getElementById('driveStatus');
  if(!supported){
    row.style.display='none';
    st.textContent='ⓘ Salvar direto na pasta funciona no Chrome/Edge do computador. No celular, use o botão “Fazer backup”.';
    return;
  }
  driveHandle=await getMeta('driveHandle');
  if(driveHandle){
    document.getElementById('connectDriveBtn').textContent='📁 Trocar pasta';
    document.getElementById('saveDriveBtn').style.display='inline-block';
    st.textContent='✅ Pasta conectada. Toque em “Salvar na pasta” para gravar o backup direto lá.';
  }else{
    document.getElementById('connectDriveBtn').textContent='📁 Conectar pasta do Drive';
    document.getElementById('saveDriveBtn').style.display='none';
    st.textContent='Escolha a pasta do Google Drive (sincronizada no PC) para salvar backups com um clique.';
  }
}
async function connectDrive(){
  if(!('showDirectoryPicker' in window)){toast('Recurso só no Chrome/Edge do PC');return}
  try{
    const handle=await window.showDirectoryPicker({mode:'readwrite'});
    driveHandle=handle;
    await putMeta('driveHandle',handle);
    toast('Pasta conectada 📁');
    refreshDriveUI();
  }catch(err){/* usuário cancelou */}
}
async function ensurePermission(handle){
  const opts={mode:'readwrite'};
  if((await handle.queryPermission(opts))==='granted')return true;
  if((await handle.requestPermission(opts))==='granted')return true;
  return false;
}
async function saveToDrive(silent){
  if(!driveHandle){if(!silent)toast('Conecte uma pasta primeiro');return false}
  try{
    if(!await ensurePermission(driveHandle)){if(!silent)toast('Permissão da pasta negada');return false}
    const {blob}=await buildBackupBlob();
    const fileHandle=await driveHandle.getFileHandle(backupFilename(),{create:true});
    const w=await fileHandle.createWritable();
    await w.write(blob);await w.close();
    if(!silent)toast('Backup salvo na pasta 💾');
    await putMeta('lastDriveBackup',new Date().toISOString().slice(0,10));
    return true;
  }catch(err){
    console.error('Falha ao salvar na pasta:',err);
    if(!silent){
      toast('Pasta indisponível — baixando o backup...');
      exportData(); // fallback: download normal
    }
    return false;
  }
}

document.getElementById('importFile').onchange=async e=>{
  const file=e.target.files[0];if(!file)return;
  try{
    const raw=await file.text();
    if(!raw||!raw.trim()){toast('O arquivo está vazio');e.target.value='';return}
    let backup;
    try{backup=JSON.parse(raw)}catch(parseErr){toast('Arquivo não é um backup válido (.json)');e.target.value='';return}
    if(!backup||backup.app!=='diario-filha'||!Array.isArray(backup.entries)){
      toast('Este arquivo não é um backup do diário');e.target.value='';return;
    }
    if(!confirm(`Importar ${backup.entries.length} registro(s)? Eles serão somados aos atuais.`)){e.target.value='';return}
    if(backup.name){babyName=backup.name;await putMeta('name',babyName)}
    if(backup.birth){birth=backup.birth;await putMeta('birth',birth)}
    let imported=0;
    for(const o of backup.entries){
      try{
        const entry={id:o.id||Date.now()+Math.random(),date:o.date,scope:o.scope,theme:o.theme,title:o.title||'',text:o.text||'',transcript:o.transcript||'',audio:o.audio?b64ToBlob(o.audio):null,media:(o.media||[]).map(m=>({type:m.type,blob:b64ToBlob(m.data)}))};
        await putEntry(entry);imported++;
      }catch(entryErr){console.warn('Registro ignorado:',entryErr)}
    }
    if(backup.info){for(const it of backup.info){try{await putInfo(it)}catch(_){}}}
    if(backup.palette){currentPalette=backup.palette;await putMeta('palette',currentPalette);applyPalette(currentPalette)}
    document.getElementById('babyName').textContent=babyName;
    render();toast(`${imported} registro(s) importado(s) 🎉`);
  }catch(err){toast('Não foi possível importar o arquivo');console.error(err)}
  e.target.value='';
};

const INFO_COLORS=[
  {id:'rosa', nm:'Rosa', c:'#c06b6b'},
  {id:'terra', nm:'Terra', c:'#e8a87c'},
  {id:'verde', nm:'Verde', c:'#9bab8a'},

  {id:'roxo', nm:'Roxo', c:'#a98bd9'},

];
const infoColorOf=id=>{
  if(typeof id==='string'&&id.charAt(0)==='#')return {id,nm:'Personalizada',c:id};
  return INFO_COLORS.find(c=>c.id===id)||INFO_COLORS[0];
};
let editingInfoId=null, selInfoColor='rosa';

async function renderInfoList(){
  const list=document.getElementById('infoList');
  if(!list)return;
  const items=(await allInfo()).sort((a,b)=>(a.order??0)-(b.order??0));
  if(!items.length){
    list.innerHTML=`<div class="empty"><span class="big">📌</span>Nenhuma informação ainda.<br><span style="font-size:12px">Toque em ＋ para adicionar hospital de nascimento, batismo, etc.</span></div>`;
    return;
  }
  list.innerHTML=items.map((it,idx)=>{
    const col=infoColorOf(it.color);
    return `<div class="info-card" style="border-left-color:${col.c}">
      <div class="info-card-top">
        <div class="info-card-title" style="color:${col.c}">${escapeHtml(it.title)}</div>
        <div class="info-reorder">
          <button onclick="moveInfo('${it.id}',-1)" ${idx===0?'disabled':''} aria-label="Subir">▲</button>
          <button onclick="moveInfo('${it.id}',1)" ${idx===items.length-1?'disabled':''} aria-label="Descer">▼</button>
        </div>
      </div>
      ${it.content?`<div class="info-card-content">${escapeHtml(it.content)}</div>`:''}
      <div class="info-card-actions">
        <button onclick="editInfo('${it.id}')">✏️ editar</button>
        <button onclick="removeInfo('${it.id}')">🗑️ excluir</button>
      </div>
    </div>`;
  }).join('');
}

function buildInfoColors(){
  const c=document.getElementById('infoColors');
  const isCustom=typeof selInfoColor==='string'&&selInfoColor.charAt(0)==='#';
  const presets=INFO_COLORS.map(col=>`<button class="ic-swatch ${col.id===selInfoColor?'on':''}" data-c="${col.id}" style="background:${col.c}" title="${col.nm}"></button>`).join('');
  const customVal=isCustom?selInfoColor:'#c06b6b';
  c.innerHTML=`${presets}
    <label class="ic-custom ${isCustom?'on':''}" title="Personalizar cor" style="background:${isCustom?selInfoColor:'#fff'}">
      ${isCustom?'':'<span class="ic-plus">+</span>'}
      <input type="color" id="icCustom" value="${customVal}">
    </label>`;
  c.querySelectorAll('.ic-swatch').forEach(b=>b.onclick=()=>{selInfoColor=b.dataset.c;buildInfoColors()});
  const custom=document.getElementById('icCustom');
  if(custom)custom.oninput=e=>{selInfoColor=e.target.value;buildInfoColors()};
}

function openInfoSheet(){
  editingInfoId=null;selInfoColor='rosa';
  document.getElementById('infoSheetTitle').textContent='Nova informação';
  document.getElementById('iTitle').value='';
  document.getElementById('iContent').value='';
  buildInfoColors();
  document.getElementById('infoOverlay').classList.add('show');
}
async function editInfo(id){
  const items=await allInfo();const it=items.find(x=>x.id===id);if(!it)return;
  editingInfoId=id;selInfoColor=it.color||'rosa';
  document.getElementById('infoSheetTitle').textContent='Editar informação';
  document.getElementById('iTitle').value=it.title||'';
  document.getElementById('iContent').value=it.content||'';
  buildInfoColors();
  document.getElementById('infoOverlay').classList.add('show');
}
function closeInfoSheet(){document.getElementById('infoOverlay').classList.remove('show')}

async function saveInfo(){
  const title=document.getElementById('iTitle').value.trim();
  const content=document.getElementById('iContent').value.trim();
  if(!title){toast('Dê um título');return}
  if(editingInfoId){
    const items=await allInfo();const it=items.find(x=>x.id===editingInfoId);
    it.title=title;it.content=content;it.color=selInfoColor;
    await putInfo(it);
  }else{
    const items=await allInfo();
    const maxOrder=items.reduce((m,x)=>Math.max(m,x.order??0),0);
    await putInfo({id:'i'+Date.now(),title,content,color:selInfoColor,order:maxOrder+1});
  }
  closeInfoSheet();renderInfoList();toast('Salvo 💛');
}
async function removeInfo(id){
  if(!confirm('Excluir esta informação?'))return;
  await delInfo(id);renderInfoList();toast('Excluído');
}
async function moveInfo(id,dir){
  const items=(await allInfo()).sort((a,b)=>(a.order??0)-(b.order??0));
  const idx=items.findIndex(x=>x.id===id);
  const swap=idx+dir;
  if(swap<0||swap>=items.length)return;
  const a=items[idx],b=items[swap];
  const tmp=a.order;a.order=b.order;b.order=tmp;
  await putInfo(a);await putInfo(b);
  renderInfoList();
}
document.getElementById('infoOverlay').onclick=e=>{if(e.target.id==='infoOverlay')closeInfoSheet()};

  applyPalette(currentPalette);

  setupAudioButtons();
  render();
  await refreshDriveUI();
  // backup diário semi-automático: só no PC com pasta conectada e recurso disponível
  if(driveHandle && ('showDirectoryPicker' in window) && !IS_MOBILE){
    const last=await getMeta('lastDriveBackup');
    const today=new Date().toISOString().slice(0,10);
    const hasEntries=(await allEntries()).length>0;
    if(hasEntries&&last!==today){
      setTimeout(async()=>{
        if(confirm('Salvar o backup de hoje na pasta do Drive agora?')){
          if(await saveToDrive(true))toast('Backup de hoje salvo no Drive 💾');
        }
      },800);
    }
  }
})();
